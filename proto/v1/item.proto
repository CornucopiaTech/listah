syntax = "proto3";
package listah.v1;


option go_package = "cornucopia/listah/internal/pkg/proto/v1";


import "v1/commons.proto";
import "google/protobuf/timestamp.proto";
import "gnostic/openapi/v3/annotations.proto";




message Item {
  string id = 1;
  string userId = 2 [json_name = "userId"];
  string title = 3;
  map<string,string> properties = 4;
  repeated string tags = 5;
  optional bool softDelete = 6;
  optional google.protobuf.Timestamp reactivateAt = 100 [json_name = "reactivateAt"];
  optional AuditUpdaterEnum updatedBy = 500 [json_name = "updatedBy"];
  optional google.protobuf.Timestamp updatedAt = 501 [json_name = "updatedAt"];
}
message Category {
  string category = 1;
  int32 rowCount = 2 [json_name = "rowCount"];
  optional string id = 100;
}
message SavedFilter {
  string id = 1;
  string userId = 2 [json_name = "userId"];
  string name = 3;
  repeated string tags = 4;
  repeated string savedFilters = 5 [json_name = "savedFilter"];
}


message ItemServiceCreateItemRequest {
  repeated Item items = 1;
}
message ItemServiceCreateItemResponse {
  repeated string itemIds = 1;
}

message ItemServiceReadItemRequest {
  string userId = 500 [json_name = "userId"];
  repeated string tags = 501;
  repeated string savedFilters = 502;
  string searchQuery = 503 [json_name = "searchQuery"];
  repeated string itemIds = 504;
  int32 pageSize = 1000 [json_name = "pageSize"];
  int32 pageNumber = 1001 [json_name = "pageNumber"];
  string sortQuery = 1002 [json_name = "sortQuery"];
}
message ItemServiceReadItemResponse {
  repeated Item items = 1;

  string userId = 500 [json_name = "userId"];
  repeated string tags = 501;
  repeated string savedFilters = 502;
  string searchQuery = 503 [json_name = "searchQuery"];
  repeated string itemIds = 504;
  int32 pageSize = 1000 [json_name = "pageSize"];
  int32 pageNumber = 1001 [json_name = "pageNumber"];
  string sortQuery = 1002 [json_name = "sortQuery"];
}
message ItemServiceUpsertItemRequest {
  repeated Item items = 1;
}
message ItemServiceUpsertItemResponse {
  repeated string itemIds = 1;
}


service ItemService {
  rpc CreateItem(ItemServiceCreateItemRequest) returns (ItemServiceCreateItemResponse){
    option (gnostic.openapi.v3.operation).description = "Create Item";
  }
  rpc ReadItem(ItemServiceReadItemRequest) returns (ItemServiceReadItemResponse){
    option idempotency_level = NO_SIDE_EFFECTS;
    option (gnostic.openapi.v3.operation).description = "Read Item";
  }
  rpc UpsertItem(ItemServiceUpsertItemRequest) returns (ItemServiceUpsertItemResponse){
    option (gnostic.openapi.v3.operation).description = "Upsert Item";
  }
}
