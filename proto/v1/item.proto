message SavedFilter {
  string id = 1;
  string userId = 2 [json_name = "userId"];
  string name = 3;
  repeated string tags = 4;
  repeated string savedFilters = 5 [json_name = "savedFilter"];
}


message ItemServiceReadItemRequest {
  string userId = 500 [json_name = "userId"];
  repeated string tags = 501;
  repeated string savedFilters = 502;
  string searchQuery = 503 [json_name = "searchQuery"];
  int32 pageSize = 1000 [json_name = "pageSize"];
  int32 pageNumber = 1001 [json_name = "pageNumber"];
  string sortQuery = 1002 [json_name = "sortQuery"];
}
