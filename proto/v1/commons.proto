syntax = "proto3";
package listah.v1;

option go_package = "cornucopia/listah/internal/pkg/proto/v1";


import "google/protobuf/timestamp.proto";

enum AuditUpdaterEnum {
  AUDIT_UPDATER_ENUM_UNSPECIFIED = 0;
  AUDIT_UPDATER_ENUM_FRONTEND = 1;
  AUDIT_UPDATER_ENUM_SYSOPS = 2;
}

message Pagination {
  int64 pageSize = 1;
  int64 pageNumber = 2;
  string sort = 3;
}


message Item {
  string id = 1;
  string userId = 2 [json_name = "userId"];
  string name = 3;
  string note = 4;
  map<string,string> props = 5;
  repeated string tags = 6;
  bool softDelete = 7;
  string updatedBy = 500;
  google.protobuf.Timestamp updatedAt = 501;
}
message Tag {
  string id = 1;
  string userId = 2;
  string name = 3;
  int32 count = 4;
}

message Filter {
  string id = 1;
  string userId = 2;
  string name = 3;
  repeated string tags = 4;
  int32 count = 5;
}

message Search {
  string text = 1;
  repeated string tags = 2;
  repeated string filters = 3;
}
