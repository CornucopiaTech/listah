
version: v2
plugins:
  # - local: protoc-gen-go
  - local: ["go", "run", "google.golang.org/protobuf/cmd/protoc-gen-go@latest"]
    out: apps/api/internal/pkg/proto
    opt: paths=source_relative

  # - local: protoc-gen-go-grpc
  - local: ["go", "run", "google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest"]
    out: apps/api/internal/pkg/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # - local: protoc-gen-connect-go
  - local: ["go", "run", "connectrpc.com/connect/cmd/protoc-gen-connect-go@latest"]
    out: apps/api/internal/pkg/proto
    opt:
      - paths=source_relative

  # - local: protoc-gen-connect-openapi
  - local: ["go", "run", "github.com/sudorandom/protoc-gen-connect-openapi@latest"]
    out: assets/docs
    strategy: all
    opt:
    - allow-get
    - format=yaml
    - path=openapi-ref.yaml
inputs:
  - directory: proto
