databaseChangeLog:
  - preConditions:
      - runningAs:
          username:  listah-admin
  - changeSet:
      id:  "1.0.1"
      author:  "Kelechi Berquist"
      labels: "root-migration"
      context: "0.0.0"
      comment: "Initial migration"
      changes:
        - createTable:
              schemaName: apps
              tableName: saved_filters
              ifNotExists: true
              columns:
                - column:
                    name:  id
                    type:  varchar
                    constraints:
                      primaryKey:  true
                      nullable:  false
                - column:
                    name:  user_id
                    type:  varchar
                    constraints:
                      nullable:  false
                - column:
                    name:  name
                    type:  varchar
                - column:
                    name:  tags
                    type:  json
                - column:
                    name:  saved_filters
                    type:  json


        -  addUniqueConstraint:
            columnNames:  id, user_id
            constraintName:  constraint_unique_saved_filters_id_user_id
            schemaName:  apps
            tableName:  saved_filters
            validate:  true
