databaseChangeLog:
  - preConditions:
      - runningAs:
          username:  listah-db-admin
  - changeSet:
      id:  "1.0.2"
      author:  "Kelechi Berquist"
      labels: "root-migration"
      context: "0.0.0"
      comment: "Initial migration"
      preconditions:
        - onFail: MARK_RAN # Options: HALT, CONTINUE, MARK_RAN, WARN
          not:
            - uniqueConstraintExists:
                constraintName: constraint_unique_tags_user_id_id
                schemaName: apps
                tableName: tags
            - uniqueConstraintExists:
                constraintName: constraint_unique_filters_user_id_id
                schemaName: apps
                tableName: filters
      changes:
        - addUniqueConstraint:
            columnNames:  user_id, id
            constraintName:  constraint_unique_tags_user_id_id
            schemaName:  apps
            tableName:  tags
            validate:  true
        - addUniqueConstraint:
            columnNames:  user_id, id
            constraintName:  constraint_unique_filters_user_id_id
            schemaName:  apps
            tableName:  filters
            validate:  true
