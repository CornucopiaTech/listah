databaseChangeLog:
  - preConditions:
      - runningAs:
          username:  listah-db-admin
  - changeSet:
      id:  "1.0.0"
      author:  "Kelechi Berquist"
      labels: "root-migration"
      context: "0.0.0"
      comment: "Initial migration"
      preconditions:
        - onFail: MARK_RAN # Options: HALT, CONTINUE, MARK_RAN, WARN
          not:
            - uniqueConstraintExists:
                constraintName: constraint_unique_items_id_user_id
                schemaName: apps
                tableName: items
            - uniqueConstraintExists:
                constraintName: constraint_unique_filters_user_id_id
                schemaName: apps
                tableName: filters
            - uniqueConstraintExists:
                constraintName: constraint_unique_filters_name_user_id
                schemaName: apps
                tableName: filters
      changes:
        - createTable:
              schemaName: apps
              tableName:  items
              ifNotExists: true
              columns:
                - column:
                    name:  id
                    type:  varchar
                    constraints:
                      primaryKey:  true
                      nullable:  false
                - column:
                    name:  user_id
                    type:  varchar
                    constraints:
                      nullable:  false
                - column:
                    name:  name
                    type:  varchar
                - column:
                    name:  note
                    type:  varchar
                - column:
                    name:  tags
                    type:  json
                - column:
                    name:  props
                    type:  json
                - column:
                    name:  reactivate_at
                    type:  timestamp
                - column:
                    name:  soft_delete
                    type:  boolean
                    defaultValueBoolean: false
                - column:
                    name:  updated_by
                    type:  varchar
                    defaultValue: api
                - column:
                    name:  updated_at
                    type:  timestamp
                    defaultValueComputed: CURRENT_TIMESTAMP


        - addUniqueConstraint:
            columnNames:  id, user_id
            constraintName:  constraint_unique_items_id_user_id
            schemaName:  apps
            tableName:  items
            validate:  true


        - createTable:
              schemaName: apps
              tableName: filters
              ifNotExists: true
              columns:
                - column:
                    name:  id
                    type:  varchar
                    constraints:
                      primaryKey:  true
                      nullable:  false
                - column:
                    name:  user_id
                    type:  varchar
                    constraints:
                      nullable:  false
                - column:
                    name:  name
                    type:  varchar
                    constraints:
                      nullable:  false
                - column:
                    name:  tags
                    type:  json
                - column:
                    name:  soft_delete
                    type:  boolean
                    defaultValueBoolean: false
                - column:
                    name:  updated_by
                    type:  varchar
                    defaultValue: api
                - column:
                    name:  updated_at
                    type:  timestamp
                    defaultValueComputed: CURRENT_TIMESTAMP


        - addUniqueConstraint:
            columnNames:  id, user_id
            constraintName:  constraint_unique_filters_id_user_id
            schemaName:  apps
            tableName:  filters
            validate:  true


        - addUniqueConstraint:
            columnNames:  name, user_id
            constraintName:  constraint_unique_filters_name_user_id
            schemaName:  apps
            tableName:  filters
            validate:  true


        - createTable:
              schemaName: instrumentation
              tableName:  logs
              ifNotExists: true
              columns:
                - column:
                    name:  id
                    type:  varchar
                    constraints:
                      primaryKey:  true
                      nullable:  false
                - column:
                    name:  request_source
                    type:  varchar
                - column:
                    name:  trace_id
                    type:  varchar
                - column:
                    name:  span_id
                    type:  varchar
                - column:
                    name:  request
                    type:  json
                    constraints:
                      nullable:  false
                - column:
                    name:  request_time
                    type:  timestamp
