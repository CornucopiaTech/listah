services:
  db:
    container_name: db
    image: postgres
    restart: always
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    env_file: .env
    volumes:
      - ./db_data/postgres:/var/lib/postgresql/
    ports:
      - "5434:5432"

  liquibase:
    container_name: liquibase
    image: liquibase/liquibase:latest
    depends_on:
      db:
        condition: service_healthy
        restart: true
    volumes:
      - ../liquibase/changelog/:/liquibase/changelog/
      - ./postgresql-42.7.10.jar:/liquibase/lib/postgresql-42.7.10.jar
    env_file: .env
    environment:
      LIQUIBASE_COMMAND_URL: ${LIQUIBASE_CONNECTION_URL} # //Automatically Read from .env file
      LIQUIBASE_COMMAND_USERNAME: ${POSTGRES_USER}
      LIQUIBASE_COMMAND_PASSWORD: ${POSTGRES_PASSWORD}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog.yaml
      LIQUIBASE_LOG_LEVEL: INFO
      LIQUIBASE_COMMAND_DRIVER: org.postgresql.Driver
      LIQUIBASE_CLASSPATH: /liquibase/lib/postgresql-42.7.10.jar
    command: "update "

  redis:
      image: redis:8.6.4-alpine
      container_name: redis_server
      restart: unless-stopped
      ports:
        - "6379:6379"
      command: redis-server /usr/local/etc/redis/redis.conf
      volumes:
        - ./db_data/redis:/data
        - ./redis.conf:/usr/local/etc/redis/redis.conf
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

networks:
  default:
    driver: bridge
