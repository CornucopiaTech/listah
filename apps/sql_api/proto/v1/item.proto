syntax = "proto3";
package listah.v1;


option go_package = "cornucopia/listah/internal/pkg/proto/v1";


import "v1/commons.proto";
import "google/protobuf/timestamp.proto";
import "gnostic/openapi/v3/annotations.proto";





// Item Messages
message ItemServiceReadItemRequest {
  string userId = 500 [json_name = "userId"];
  Search query = 501;
  Pagination pagination = 502;
}
message ItemServiceReadItemResponse {
  repeated Item items = 1;
  int32 totalRecordCount = 2;

  string userId = 500 [json_name = "userId"];
  Search query = 501;
  Pagination pagination = 502;

}
message ItemServiceUpsertItemRequest {
  repeated Item items = 1;
}
message ItemServiceUpsertItemResponse {
  repeated string itemIds = 1;
}


// Tag Messages
message ItemServiceReadTagRequest {
  string userId = 500 [json_name = "userId"];
  Search query = 501;
  Pagination pagination = 502;
}
message ItemServiceReadTagResponse {
  repeated Tag tags = 1;
  int32 totalRecordCount = 2;

  string userId = 500 [json_name = "userId"];
  Search query = 501;
  Pagination pagination = 502;
}
message ItemServiceUpsertTagRequest {
  repeated Tag tags = 1;
}
message ItemServiceUpsertTagResponse {
  repeated string tagIds = 1;
}


// Filter Messages
message ItemServiceReadFilterRequest {
  string userId = 500 [json_name = "userId"];
  Search query = 501;
  Pagination pagination = 502;
}
message ItemServiceReadFilterResponse {
  repeated Filter filters = 1;
  int32 totalRecordCount = 2;

  string userId = 500 [json_name = "userId"];
  Search query = 501;
  Pagination pagination = 502;
}
message ItemServiceUpsertFilterRequest {
  repeated Filter filters = 1;
}
message ItemServiceUpsertFilterResponse {
  repeated string filterIds = 1;
}





service ItemService {
  rpc ReadItem(ItemServiceReadItemRequest) returns (ItemServiceReadItemResponse){
    option idempotency_level = NO_SIDE_EFFECTS;
    option (gnostic.openapi.v3.operation).description = "Read Item";
  }
  rpc UpsertItem(ItemServiceUpsertItemRequest) returns (ItemServiceUpsertItemResponse){
    option (gnostic.openapi.v3.operation).description = "Upsert Item";
  }
  rpc ReadTag(ItemServiceReadTagRequest) returns (ItemServiceReadTagResponse){
    option idempotency_level = NO_SIDE_EFFECTS;
    option (gnostic.openapi.v3.operation).description = "Read Tag";
  }
  rpc UpsertTag(ItemServiceUpsertTagRequest) returns (ItemServiceUpsertTagResponse){
    option (gnostic.openapi.v3.operation).description = "Upsert Tag";
  }
  rpc ReadFilter(ItemServiceReadFilterRequest) returns (ItemServiceReadFilterResponse){
    option idempotency_level = NO_SIDE_EFFECTS;
    option (gnostic.openapi.v3.operation).description = "Read Filter";
  }
  rpc UpsertFilter(ItemServiceUpsertFilterRequest) returns (ItemServiceUpsertFilterResponse){
    option (gnostic.openapi.v3.operation).description = "Upsert Filter";
  }
}
